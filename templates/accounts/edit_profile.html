{% extends 'base.html' %}

{% block title %}Edit Profile - LuxeEstate{% endblock %}

{% block content %}
<div class="container page-section">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card-panel">
                <h1 class="mb-3">Edit Profile</h1>
                <p class="text-secondary mb-4">Update your personal details and preferences.</p>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-magical w-100">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
